<!DOCTYPE html>
<html>
<head>
  <title>Expo Go QR Code</title>
  <style>
    body { display: flex; flex-direction: column; align-items: center; justify-content: center; min-height: 100vh; margin: 0; background: #1a1a2e; color: #fff; font-family: -apple-system, BlinkMacSystemFont, sans-serif; }
    h1 { margin-bottom: 8px; font-size: 24px; }
    p { color: #aaa; margin-bottom: 32px; font-size: 14px; }
    canvas { border-radius: 16px; background: #fff; padding: 16px; }
    code { background: #333; padding: 4px 12px; border-radius: 6px; font-size: 16px; margin-top: 24px; display: inline-block; }
  </style>
</head>
<body>
  <h1>Scan with Expo Go</h1>
  <p>Make sure your phone is on the same Wi-Fi network</p>
  <canvas id="qr"></canvas>
  <code>exp://192.168.1.14:8081</code>
  <script src="https://cdn.jsdelivr.net/npm/qrcode@1/build/qrcode.min.js"></script>
  <script>
    QRCode.toCanvas(document.getElementById('qr'), 'exp://192.168.1.14:8081', {
      width: 280, margin: 2, color: { dark: '#000', light: '#fff' }
    });
  </script>
</body>
</html>
